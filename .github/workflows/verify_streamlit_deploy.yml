name: Verify Streamlit Deploy

on:
  push:
    branches: [ main ]

jobs:
  verify-deploy:
    runs-on: ubuntu-latest
    env:
      APP_URL: https://circuit-forge-play-app31.streamlit.app/
      RETRIES: 30
      SLEEP_SECONDS: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for app to become available
        id: wait_for_app
        run: |
          set -e
          attempts=0
          last_resp_file=$(mktemp)
          echo "Checking $APP_URL with up to $RETRIES attempts (sleep $SLEEP_SECONDS)" > "$last_resp_file"
          while [ $attempts -lt $RETRIES ]; do
            # capture headers and body to temporary files for debugging
            resp_headers=$(mktemp)
            resp_body=$(mktemp)
            http_code=$(curl -s -D "$resp_headers" -o "$resp_body" -w "%{http_code}" "$APP_URL" || true)
            echo "Attempt $attempts: HTTP $http_code" | tee -a "$last_resp_file"
            echo "--- HEADERS ---" >> "$last_resp_file"
            cat "$resp_headers" >> "$last_resp_file"
            echo "--- BODY (truncated) ---" >> "$last_resp_file"
            head -n 200 "$resp_body" >> "$last_resp_file" || true

            if [ "$http_code" = "200" ]; then
              echo "app_available=true" >> $GITHUB_OUTPUT
              # save last response for records
              mv "$last_resp_file" "$GITHUB_WORKSPACE/verify_last_response.txt" || true
              exit 0
            fi

            attempts=$((attempts+1))
            sleep $SLEEP_SECONDS
          done
          echo "app_available=false" >> $GITHUB_OUTPUT
          # save last response for upload
          mv "$last_resp_file" "$GITHUB_WORKSPACE/verify_last_response.txt" || true

      - name: Create or update Deployment Status issue (FAILURES ONLY)
        if: ${{ steps.wait_for_app.outputs.app_available != 'true' }}
        id: create_issue
        uses: actions/github-script@v7
        with:
          script: |
            const appUrl = process.env.APP_URL
            const sha = process.env.GITHUB_SHA
            const title = 'Streamlit deployment status (automated) - FAILURE'
            const body = `❌ Deployment failed to respond for commit ${sha} within timeout.\n\nApp URL: ${appUrl}`

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            })

            let existing = issues.find(i => i.title === title)
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              })
              return { issue_number: existing.number }
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deployment','failure']
              })
              return { issue_number: created.data.number }
            }

      - name: Notify Slack (if configured)
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -e
          AVAILABLE='${{ steps.wait_for_app.outputs.app_available }}'
          SHA=${GITHUB_SHA}
          APP_URL=${APP_URL}
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "No SLACK_WEBHOOK_URL secret set, skipping Slack notification"
            exit 0
          fi
          if [ "$AVAILABLE" = "true" ]; then
            MSG="✅ Streamlit deployed successfully for ${SHA} — ${APP_URL}"
          else
            MSG="❌ Streamlit did not become available for ${SHA} — ${APP_URL}"
          fi
          payload=$(jq -n --arg text "$MSG" '{text:$text}') || payload="{\"text\": \"$MSG\"}"
          curl -s -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK"

      - name: Send Email Notifications (if SMTP configured)
        if: ${{ secrets.SMTP_HOST != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' && secrets.EMAIL_RECIPIENTS != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Streamlit Deploy] ${{ steps.wait_for_app.outputs.app_available == 'true' && 'SUCCESS' || 'FAIL' }} — ${{ github.sha }}"
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: ${{ secrets.SMTP_FROM || secrets.SMTP_USERNAME }}
          body: |
            Deployment ${APP_URL}
            Commit: ${{ github.sha }}
            Available: ${{ steps.wait_for_app.outputs.app_available }}

      - name: Fail job when deploy unavailable
        if: ${{ steps.wait_for_app.outputs.app_available != 'true' }}
        run: |
          echo "Streamlit app did not become available within timeout." >&2
          exit 1

      - name: Upload verify response (for debugging)
        if: ${{ steps.wait_for_app.outputs.app_available != 'true' }}
        uses: actions/upload-artifact@v3
        with:
          name: verify-last-response
          path: verify_last_response.txt
