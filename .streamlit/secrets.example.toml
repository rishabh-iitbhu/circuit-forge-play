# Example secrets file for Streamlit Cloud
# Copy this to .streamlit/secrets.toml in the Streamlit app settings
# Do NOT commit your real secrets to the repository.

# OpenAI API key used by `lib.llm_assistant` if you use OpenAI integrations
OPENAI_API_KEY = "your-openai-api-key-here"

# Optional: other service keys (e.g., PowerCrux, distributor APIs)
# POWECRUX_API_KEY = "your-powercrux-key"
# MOUSER_API_KEY = "your-mouser-key"

# Example: set a custom Streamlit server port (usually not required)
# PORT = 8501
